<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SWT | Smart World TradeUs</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7564607050205405"
     crossorigin="anonymous"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Montserrat', sans-serif;
    }

    body {
        background: #000;
        color: #fff;
        overflow-x: hidden;
    }
    .rain {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        background-image: 
            linear-gradient(white 2px, transparent 2px),
            linear-gradient(white 2px, transparent 2px);
        background-size: 2px 20px, 2px 20px;
        background-position: 0 0, 50px 0;
        animation: rain 0.5s linear infinite;
        opacity: 0.15;
        z-index: -1;
    }

    @keyframes rain {
        0% { background-position: 0 0, 50px 0; }
        100% { background-position: 0 20px, 50px 20px; }
    }
    nav {
        width: 100%;
        padding: 30px 60px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: fixed;
        top: 0;
        backdrop-filter: blur(6px);
        z-index: 10;
    }
    .logo {
        font-size: 34px;
        font-weight: 700;
        letter-spacing: 2px;
        cursor: pointer;
        display: inline-block;
        animation: slash 2.5s infinite linear;
        transition: transform 0.3s ease, text-shadow 0.3s ease;
    }

    .logo:hover {
        transform: scale(1.2);
        text-shadow: 0 0 25px white;
    }

    @keyframes slash {
        0% { clip-path: inset(0 0 0 0); opacity: 1; }
        50% { clip-path: inset(0 50% 0 0); opacity: 0.7; }
        100% { clip-path: inset(0 0 0 0); opacity: 1; }
    }
    .nav-links {
        display: flex;
        gap: 50px;
    }

    .nav-links a {
        text-decoration: none;
        color: white;
        font-size: 24px;
        font-weight: 500;
        transition: 0.3s ease;
    }

    .nav-links a:hover {
        transform: scale(1.2);
        text-shadow: 0 0 15px white;
    }
    .about {
        margin-top: 200px;
        padding: 0 60px;
        max-width: 900px;
    }

    .about h1 {
        font-size: 65px;
        margin-bottom: 25px;
        text-shadow: 0 0 25px white;
        animation: glow 3s infinite alternate;
    }

    @keyframes glow {
        0% { text-shadow: 0 0 10px white; }
        100% { text-shadow: 0 0 30px white; }
    }

    .about p {
        font-size: 26px;
        line-height: 1.8;
        opacity: 0.9;
    }
    footer {
        margin-top: 150px;
        padding: 20px;
        text-align: center;
        opacity: 0.7;
        font-size: 20px;
    }
</style>
</head>

<body>

<div class="rain"></div>

<nav>
    <div class="logo">SWT — Smart World Trade</div>

    <div class="nav-links">
        <a href="#">About Us</a>
        <a href="#">Reviews</a>
        <a href="#">Stores</a>
    </div>
</nav>

<section class="about">
    <h1>About Us</h1>
    <p>
        SWT — Smart World Trade
        <br><br>
    </p>
</section>

<footer>
Site Developer: Tamim Mojumder
</footer>

</body>
</html>
